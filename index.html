<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,200;14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Toolbar -->
        <header class="toolbar">
            <div class="toolbar-leading">
                <button id="add-btn" class="toolbar-icon-btn" title="Add">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <div class="toolbar-center">
                <div class="segmented-control" id="tab-control">
                    <div class="segment-bg" id="segment-bg"></div>
                    <button class="segment active" data-tab="world-clock">
                        <svg class="seg-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/>
                        </svg>
                        <span>World Clock</span>
                    </button>
                    <button class="segment" data-tab="alarm">
                        <svg class="seg-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/><path d="M5 3 2 6"/><path d="M22 6l-3-3"/>
                        </svg>
                        <span>Alarm</span>
                    </button>
                    <button class="segment" data-tab="stopwatch">
                        <svg class="seg-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M10 2h4"/><path d="M20 5l-1.5 1.5"/>
                        </svg>
                        <span>Stopwatch</span>
                    </button>
                    <button class="segment" data-tab="timer">
                        <svg class="seg-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                        </svg>
                        <span>Timer</span>
                    </button>
                    <button class="segment" data-tab="pomodoro">
                        <svg class="seg-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2v2"/><path d="M12 20v2"/><path d="M5 12H3"/><path d="M21 12h-2"/><path d="M19.07 4.93l-1.41 1.41"/><path d="M6.34 17.66l-1.41 1.41"/><path d="M19.07 19.07l-1.41-1.41"/><path d="M6.34 6.34L4.93 4.93"/>
                            <circle cx="12" cy="12" r="5"/>
                        </svg>
                        <span>Pomodoro</span>
                    </button>
                </div>
            </div>
            <div class="toolbar-trailing"></div>
        </header>

        <!-- Tab Content -->
        <main class="content">
            <!-- World Clock Tab -->
            <section id="world-clock-tab" class="tab active">
                <div class="clock-grid" id="clock-grid"></div>
                <div class="empty-state" id="world-empty" style="display:none">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/>
                    </svg>
                    <p class="empty-title">No World Clocks</p>
                    <p class="empty-subtitle">Click + to add a city</p>
                </div>
            </section>

            <!-- Alarm Tab -->
            <section id="alarm-tab" class="tab">
                <div class="alarm-list" id="alarm-list"></div>
                <div class="empty-state" id="alarm-empty" style="display:none">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                    <p class="empty-title">No Alarms</p>
                    <p class="empty-subtitle">Click + to add an alarm</p>
                </div>
            </section>

            <!-- Stopwatch Tab -->
            <section id="stopwatch-tab" class="tab">
                <div class="stopwatch-container">
                    <div class="stopwatch-display">
                        <span class="stopwatch-time" id="stopwatch-time">00:00<span class="stopwatch-cs">.00</span></span>
                    </div>
                    <div class="round-btn-row">
                        <button class="round-btn round-btn--gray disabled" id="sw-left-btn">
                            <span>Reset</span>
                        </button>
                        <button class="round-btn round-btn--green" id="sw-right-btn">
                            <span>Start</span>
                        </button>
                    </div>
                    <div class="lap-table-container">
                        <table class="lap-table" id="lap-table">
                            <tbody id="lap-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- Timer Tab -->
            <section id="timer-tab" class="tab">
                <div class="timer-container">
                    <div class="timer-picker-state" id="timer-picker-state">
                        <div class="timer-picker-wrap">
                            <div class="picker-group">
                                <div class="picker-col" id="picker-hours"></div>
                                <span class="picker-label">hours</span>
                            </div>
                            <div class="picker-group">
                                <div class="picker-col" id="picker-minutes"></div>
                                <span class="picker-label">min</span>
                            </div>
                            <div class="picker-group">
                                <div class="picker-col" id="picker-seconds"></div>
                                <span class="picker-label">sec</span>
                            </div>
                        </div>
                        <div class="round-btn-row">
                            <button class="round-btn round-btn--gray" id="timer-cancel-btn">
                                <span>Cancel</span>
                            </button>
                            <button class="round-btn round-btn--green" id="timer-start-btn">
                                <span>Start</span>
                            </button>
                        </div>
                        <div class="recent-timers" id="recent-timers"></div>
                    </div>

                    <div class="timer-running-state" id="timer-running-state" style="display:none">
                        <div class="timer-circle-wrap">
                            <svg class="timer-svg" viewBox="0 0 200 200">
                                <circle class="timer-ring-bg" cx="100" cy="100" r="90" />
                                <circle class="timer-ring-progress" id="timer-ring-progress" cx="100" cy="100" r="90" />
                            </svg>
                            <div class="timer-remaining-text" id="timer-remaining">00:00:00</div>
                        </div>
                        <div class="round-btn-row">
                            <button class="round-btn round-btn--gray" id="timer-cancel-btn-2">
                                <span>Cancel</span>
                            </button>
                            <button class="round-btn round-btn--orange" id="timer-pause-btn">
                                <span>Pause</span>
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Pomodoro Tab -->
            <section id="pomodoro-tab" class="tab">
                <div class="pomodoro-container">
                    <button class="icon-btn pomodoro-settings-btn" id="pomodoro-settings-btn" title="Settings">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                        </svg>
                    </button>
                    
                    <div class="pomodoro-header">
                        <h2 class="pomodoro-phase-label" id="pomodoro-phase-label">Focus</h2>
                        <div class="pomodoro-cycles" id="pomodoro-cycles">
                            <div class="cycle-dot"></div>
                            <div class="cycle-dot"></div>
                            <div class="cycle-dot"></div>
                            <div class="cycle-dot"></div>
                        </div>
                    </div>

                    <div class="timer-circle-wrap pomodoro-circle-wrap">
                        <svg class="timer-svg" viewBox="0 0 200 200">
                            <circle class="timer-ring-bg" cx="100" cy="100" r="90" />
                            <circle class="timer-ring-progress" id="pomodoro-ring-progress" cx="100" cy="100" r="90" />
                        </svg>
                        <div class="timer-remaining-text pomodoro-remaining-text" id="pomodoro-remaining">25:00</div>
                    </div>
                    
                    <div class="round-btn-row">
                        <button class="round-btn round-btn--gray" id="pomodoro-skip-btn">
                            <span>Skip</span>
                        </button>
                        <button class="round-btn round-btn--green" id="pomodoro-start-btn">
                            <span>Start</span>
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Add City Modal -->
    <div class="modal-overlay" id="add-city-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>Add City</h2>
                <button class="modal-close" id="close-city-modal">&times;</button>
            </div>
            <div class="modal-search">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" id="city-search" placeholder="Search cities..." autocomplete="off">
            </div>
            <div class="modal-list" id="city-list"></div>
        </div>
    </div>

    <!-- Add Alarm Modal -->
    <div class="modal-overlay" id="add-alarm-modal">
        <div class="modal alarm-modal">
            <div class="modal-header">
                <button class="modal-text-btn" id="alarm-modal-cancel">Cancel</button>
                <h2>Add Alarm</h2>
                <button class="modal-text-btn primary" id="alarm-modal-save">Save</button>
            </div>
            <div class="alarm-time-picker">
                <div class="picker-group">
                    <div class="picker-col" id="alarm-picker-hours"></div>
                </div>
                <span class="picker-colon">:</span>
                <div class="picker-group">
                    <div class="picker-col" id="alarm-picker-minutes"></div>
                </div>
                <div class="picker-group">
                    <div class="picker-col" id="alarm-picker-ampm"></div>
                </div>
            </div>
            <div class="alarm-fields">
                <div class="alarm-field-row">
                    <label>Label</label>
                    <input type="text" id="alarm-label" placeholder="Alarm" value="Alarm">
                </div>
                <div class="alarm-field-row">
                    <label>Repeat</label>
                    <div class="day-pills" id="alarm-repeat-days">
                        <button class="day-pill" data-day="0">S</button>
                        <button class="day-pill" data-day="1">M</button>
                        <button class="day-pill" data-day="2">T</button>
                        <button class="day-pill" data-day="3">W</button>
                        <button class="day-pill" data-day="4">T</button>
                        <button class="day-pill" data-day="5">F</button>
                        <button class="day-pill" data-day="6">S</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
